name: C PROJ Compat

on:
  workflow_dispatch:
    inputs:
      run_benchmarks:
        description: Run the Criterion comparison benchmark and upload reports
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  parity:
    name: Live C PROJ Parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run live parity test against bundled C PROJ
        run: cargo test -p proj-core --features c-proj-compat --test live_c_proj_parity

  benchmark:
    name: C PROJ Comparison Bench
    runs-on: ubuntu-latest
    needs: parity
    if: ${{ inputs.run_benchmarks }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Criterion comparison bench
        run: cargo bench -p proj-core --features c-proj-compat --bench transform_compare_bench
      - name: Upload Criterion reports
        uses: actions/upload-artifact@v4
        with:
          name: criterion-c-proj-compat
          path: target/criterion
          if-no-files-found: error
